services:
  api:
    build: ./backend
    env_file: .env
    ports: ["8000:8000"]
    volumes: ["./backend/.proxima-data:/app/.proxima-data"]
  web:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    ports: ["3001:3000"]
    volumes: ["./frontend:/app"]
    depends_on: [api]
